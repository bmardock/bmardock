<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Intent-Driven Execution loop diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="920" height="360" rx="18" ry="18" fill="#ffffff"/>
  <rect x="16" y="16" width="888" height="328" rx="14" ry="14" fill="none" stroke="#111" stroke-width="2" opacity="0.12"/>

  <!-- Title -->
  <text x="40" y="60" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="700" fill="#111">
    Intent-Driven Execution
  </text>
  <text x="40" y="84" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111" opacity="0.75">
    An “air traffic controller” loop: steer outcomes, escalate depth only when needed.
  </text>

  <!-- Controller -->
  <rect x="40" y="120" width="250" height="190" rx="18" ry="18" fill="none" stroke="#111" stroke-width="2"/>
  <text x="65" y="155" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">
    Air Traffic Controller
  </text>
  <text x="65" y="180" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111">
    • keeps intent current
  </text>
  <text x="65" y="200" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111">
    • decides when to go deep
  </text>
  <text x="65" y="220" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111">
    • routes work to checks
  </text>
  <text x="65" y="240" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111">
    • asks smallest next steer
  </text>

  <!-- Loop nodes -->
  <g fill="none" stroke="#111" stroke-width="2">
    <rect x="350" y="120" width="140" height="70" rx="18"/>
    <rect x="520" y="120" width="140" height="70" rx="18"/>
    <rect x="690" y="120" width="140" height="70" rx="18"/>
    <rect x="520" y="220" width="140" height="70" rx="18"/>
    <rect x="350" y="220" width="140" height="70" rx="18"/>
  </g>

  <!-- Labels -->
  <text x="392" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">Intent</text>
  <text x="560" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">Act</text>
  <text x="723" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">Check</text>
  <text x="548" y="260" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">Correct</text>
  <text x="385" y="260" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111">Continue</text>

