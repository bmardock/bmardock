<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Intent Driven Execution loop diagram">

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111111"></path>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="920" height="360" rx="18" ry="18" fill="#ffffff"></rect>
  <rect x="16" y="16" width="888" height="328" rx="14" ry="14" fill="none" stroke="#111111" stroke-width="2" opacity="0.12"></rect>

  <!-- Title -->
  <text x="40" y="60" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="700" fill="#111111">
    Intent Driven Execution
  </text>

  <text x="40" y="84" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="500" fill="#111111" opacity="0.75">
    Air traffic controller loop for steering outcomes
  </text>

  <!-- Controller -->
  <rect x="40" y="120" width="250" height="190" rx="18" ry="18" fill="none" stroke="#111111" stroke-width="2"></rect>

  <text x="65" y="155" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111111">
    Air Traffic Controller
  </text>

  <text x="65" y="180" font-size="12" fill="#111111">
    Keeps intent current
  </text>
  <text x="65" y="200" font-size="12" fill="#111111">
    Decides when to go deep
  </text>
  <text x="65" y="220" font-size="12" fill="#111111">
    Routes work to checks
  </text>
  <text x="65" y="240" font-size="12" fill="#111111">
    Asks for smallest next steer
  </text>

  <!-- Loop boxes -->
  <g fill="none" stroke="#111111" stroke-width="2">
    <rect x="350" y="120" width="140" height="70" rx="18"></rect>
    <rect x="520" y="120" width="140" height="70" rx="18"></rect>
    <rect x="690" y="120" width="140" height="70" rx="18"></rect>
    <rect x="520" y="220" width="140" height="70" rx="18"></rect>
    <rect x="350" y="220" width="140" height="70" rx="18"></rect>
  </g>

  <!-- Labels -->
  <text x="392" y="160" font-size="14" font-weight="700">Intent</text>
  <text x="560" y="160" font-size="14" font-weight="700">Act</text>
  <text x="723" y="160" font-size="14" font-weight="700">Check</text>
  <text x="548" y="260" font-size="14" font-weight="700">Correct</text>
  <text x="385" y="260" font-size="14" font-weight="700">Continue</text>

  <!-- Arrows -->
  <g stroke="#111111" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M290 170 C320 170, 320 155, 350 155"></path>
    <path d="M490 155 L520 155"></path>
    <path d="M660 155 L690 155"></path>
    <path d="M760 190 C760 215, 690 235, 660 255"></path>
    <path d="M520 255 L490 255"></path>
    <path d="M350 255 C320 255, 320 210, 350 170"></path>
  </g>

  <!-- Depth callout -->
  <path d="M690 90 L690 60 L880 60" stroke="#111111" stroke-width="2" fill="none"></path>

  <text x="700" y="54" font-size="12" font-weight="600">
    Go deep only when triggered
  </text>

  <text x="700" y="76" font-size="12" opacity="0.75">
    High ambiguity, failing checks, large diffs
  </text>

  <!-- Footer -->
  <text x="40" y="338" font-size="12" opacity="0.75">
    Shallow by default. Depth is conditional.
  </text>

</svg>
